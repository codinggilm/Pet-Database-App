@if (pages.length > 1 ) {
    <button class="page-arrow prev" (click)="goToPreviousPage()">
        ←
    </button>
    
    @for (page of pages; track $index) {
        <!-- TODO: buttons need an active / disabled class -->
        <button  
            class="page-number" 
            (click)="goToSelectedPage($index)">
            {{page}}
        </button>
    }

    <button class="page-arrow next" (click)="goToNextPage()">
        →
    </button>
}
